server {
    listen 80;
    server_name localhost;

    client_max_body_size 100m;

    # Маршрут для JupyterHub
    location /jhub/ {
        # auth_request проверяет сессию пользователя через внутренний эндпоинт /_auth_jhub
        auth_request /_auth_jhub;
        # Сохраняем результат проверки (X-Remote-User) в переменную $jhub_user
        auth_request_set $jhub_user $upstream_http_x_remote_user;
        # Передаем имя пользователя в заголовке для JupyterHub
        proxy_set_header X-Remote-User $jhub_user;

        # Проксируем все запросы к JupyterHub, который слушает внутри Docker
        proxy_pass http://jupyterhub:8000/jhub/;
        proxy_http_version 1.1;

        # Заголовки для корректной работы proxied-сервера
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Заголовки для поддержки WebSocket (JupyterHub использует их)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймауты на чтение и запись прокси
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Внутренний эндпоинт для проверки авторизации
    location = /_auth_jhub {
        internal;
        proxy_pass http://backend:8000/auth/jhub;

        # Не передаем тело запроса
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        # Передаем оригинальный URI и другие заголовки
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # Все остальные запросы идут на backend приложения
    location / {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Поддержка WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
